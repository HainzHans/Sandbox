<div
  class="slot-card"
  [class.slot-card--selected]="selected()"
  (click)="onSelect()"
>
  <div class="slot-card__check">
    <i class="pi pi-check"></i>
  </div>
  <span class="slot-card__full-date">
    <i class="pi pi-calendar"></i>
    {{ slot().date | formatDate}}
  </span>
  <span class="slot-card__time">
    <i class="pi pi-clock"></i>
    {{ slot().time | slice:0:5}}
  </span>
</div>
